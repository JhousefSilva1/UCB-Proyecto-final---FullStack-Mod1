name: CI

on:
  push:
    branches:
      - main
      - "feature/**"

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      confirmacion:
        description: "Escribe DEPLOY para confirmar el despliegue a producción"
        required: true
        type: string

jobs:
  frontend:
    name: Frontend - Lint, pruebas y build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Frontend

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar lint
        run: npm run lint

      - name: Ejecutar pruebas unitarias y de componente
        run: npm run test

      - name: Compilar frontend
        run: npm run build

  backend:
    name: Backend - Lint, pruebas de API y build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Backend

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      NODE_ENV: test

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar lint
        run: npm run lint

      - name: Ejecutar pruebas de API
        run: npm run test

      - name: Compilar backend
        run: npm run build

  deploy-staging:
    name: Deploy a Staging
    needs:
      - frontend
      - backend

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Desplegar a Railway staging
        run: railway up --service UCB-Proyecto-final---FullStack-Mod1 --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}

  deploy-production:
    name: Deploy a Producción manual
    needs:
      - frontend
      - backend

    if: github.event_name == 'workflow_dispatch' && inputs.confirmacion == 'DEPLOY'
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Desplegar a Railway producción
        run: railway up --service UCB-Proyecto-final---FullStack-Mod1 --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_TOKEN }}