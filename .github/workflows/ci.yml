name: CI

on:
  push:
    branches:
      - main
      - "feature/**"

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      confirmacion:
        description: "Escribe DEPLOY para confirmar el despliegue a producción"
        required: true
        type: string

jobs:
  pruebas:
    name: Pruebas con variables seguras
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Backend

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar backend
        run: npm run build

  deploy-staging:
    name: Deploy a Staging
    needs: [pruebas]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Desplegar a Railway staging
        run: railway up --service backend --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}

  deploy-production:
    name: Deploy a Producción manual
    needs: [pruebas]
    if: github.event_name == 'workflow_dispatch' && inputs.confirmacion == 'DEPLOY'
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Desplegar a Railway producción
        run: railway up --service backend --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_TOKEN }}