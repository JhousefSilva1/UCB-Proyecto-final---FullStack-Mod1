name: CI

on:
  push:
    branches:
      - main
      - "feature/**"

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      confirmacion:
        description: "Escribe DEPLOY para confirmar el despliegue a producción"
        required: true
        type: string

jobs:
  frontend:
    name: Frontend - Lint, pruebas y build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Frontend

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar lint
        run: npm run lint

      - name: Ejecutar pruebas unitarias y de componente
        run: npm run test

      - name: Compilar frontend
        run: npm run build

  backend:
    name: Backend - Lint, pruebas de API y build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Backend

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      NODE_ENV: test

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar lint
        run: npm run lint

      - name: Ejecutar pruebas de API
        run: npm run test

      - name: Compilar backend
        run: npm run build

  migraciones:
    name: Migraciones y seed
    needs:
      - backend

    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "123456"
          POSTGRES_DB: taskmanager

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres -d taskmanager"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: ./Backend

    env:
      DATABASE_URL: postgresql://postgres:123456@localhost:5432/taskmanager?schema=public
      JWT_SECRET: test-secret
      NODE_ENV: test

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Generar Prisma Client
        run: npx prisma generate

      - name: Ejecutar migraciones
        run: npx prisma migrate deploy

      - name: Ejecutar seed
        run: npx prisma db seed

      - name: Verificar estado de migraciones
        run: npx prisma migrate status

  docker-compose:
    name: Docker Compose - 3 servicios
    needs:
      - frontend
      - backend
      - migraciones

    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Levantar los tres servicios
        run: docker compose up --build -d

      - name: Esperar a PostgreSQL
        run: |
          for i in {1..30}; do
            if docker compose exec -T postgres \
              pg_isready -U postgres -d taskmanager; then
              echo "PostgreSQL disponible"
              exit 0
            fi

            echo "Esperando PostgreSQL..."
            sleep 3
          done

          echo "PostgreSQL no respondió"
          docker compose logs postgres
          exit 1

      - name: Esperar al Backend
        run: |
          for i in {1..30}; do
            if curl --fail http://localhost:4001/; then
              echo "Backend disponible"
              exit 0
            fi

            echo "Esperando al backend..."
            sleep 3
          done

          echo "El backend no respondió"
          docker compose logs backend
          exit 1

      - name: Esperar al Frontend
        run: |
          for i in {1..30}; do
            if curl --fail http://localhost:5173/; then
              echo "Frontend disponible"
              exit 0
            fi

            echo "Esperando al frontend..."
            sleep 3
          done

          echo "El frontend no respondió"
          docker compose logs frontend
          exit 1

      - name: Mostrar servicios activos
        run: docker compose ps

      - name: Verificar que existan tres servicios activos
        run: |
          RUNNING_SERVICES=$(docker compose ps --services --status running | wc -l)

          echo "Servicios activos: $RUNNING_SERVICES"

          if [ "$RUNNING_SERVICES" -ne 3 ]; then
            echo "Se esperaban 3 servicios activos"
            docker compose ps
            exit 1
          fi

      - name: Mostrar logs si falla
        if: failure()
        run: docker compose logs

      - name: Detener servicios
        if: always()
        run: docker compose down -v

  e2e:
    name: E2E - Playwright
    needs:
      - docker-compose

    runs-on: ubuntu-latest

    env:
      VITE_API_URL: http://localhost:4001

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Instalar dependencias del Frontend
        working-directory: ./Frontend
        run: npm ci

      - name: Instalar Chromium
        working-directory: ./Frontend
        run: npx playwright install --with-deps chromium

      - name: Levantar PostgreSQL y Backend
        run: docker compose up --build -d postgres backend

      - name: Esperar al Backend
        run: |
          for i in {1..30}; do
            if curl --fail http://localhost:4001/; then
              echo "Backend disponible"
              exit 0
            fi

            echo "Esperando al backend..."
            sleep 3
          done

          echo "El backend no respondió"
          docker compose logs backend
          exit 1

      - name: Ejecutar migraciones
        run: docker compose exec -T backend npx prisma migrate deploy

      - name: Verificar endpoint de tareas
        run: curl --fail http://localhost:4001/tasks

      - name: Ejecutar prueba E2E
        working-directory: ./Frontend
        run: npm run test:e2e

      - name: Subir reporte de Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Frontend/playwright-report/
          retention-days: 7

      - name: Mostrar logs de Docker si falla
        if: failure()
        run: docker compose logs

      - name: Detener servicios
        if: always()
        run: docker compose down -v

  deploy-staging:
    name: Deploy a Staging
    needs:
      - frontend
      - backend
      - migraciones
      - docker-compose
      - e2e

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Desplegar a Railway staging
        run: railway up --service UCB-Proyecto-final---FullStack-Mod1 --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}

  deploy-production:
    name: Deploy a Producción manual
    needs:
      - frontend
      - backend
      - migraciones
      - docker-compose
      - e2e

    if: github.event_name == 'workflow_dispatch' && inputs.confirmacion == 'DEPLOY'
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Railway CLI
        run: npm install -g @railway/cli

      - name: Desplegar a Railway producción
        run: railway up --service UCB-Proyecto-final---FullStack-Mod1 --ci
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_TOKEN }}